name: Build solarmapp

on:
  push:
    tags:
      - 'v*'          # Se activa al crear un tag tipo v1.0.0
  workflow_dispatch:  # También se puede lanzar manualmente desde GitHub

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'   # Mac Apple Silicon
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'    # Mac Intel
          - platform: windows-latest
            args: ''                                # Windows x64 → .exe + .msi
          - platform: ubuntu-22.04
            args: ''                                # Linux → .deb + .AppImage

    runs-on: ${{ matrix.platform }}

    steps:
      # 1. Descargar el código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Instalar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Instalar Rust
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # 4. Dependencias del sistema en Linux
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      # 5. Cache de Rust para compilaciones más rápidas
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # 6. Instalar dependencias npm
      - name: Install npm dependencies
        run: npm install

      # 7. Compilar con Tauri
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'solarmapp ${{ github.ref_name }}'
          releaseBody: |
            ## solarmapp ${{ github.ref_name }}

            ### Descargas

            | Plataforma | Archivo |
            |------------|---------|
            | macOS (Apple Silicon) | `solarmapp_*_aarch64.dmg` |
            | macOS (Intel)         | `solarmapp_*_x64.dmg` |
            | Windows               | `solarmapp_*_x64-setup.exe` o `.msi` |
            | Linux                 | `solarmapp_*_amd64.AppImage` |

            ### Instalación
            - **macOS**: abre el `.dmg`, arrastra a Aplicaciones
            - **Windows**: ejecuta el `.exe` o `.msi` como administrador
            - **Linux**: dale permisos de ejecución al `.AppImage` (`chmod +x`)
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
